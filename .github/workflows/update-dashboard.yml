name: Dashboard Update

on:
  schedule:
    # Twice daily: 7am and 7pm ET (11:00 and 23:00 UTC)
    - cron: '0 11,23 * * *'
  workflow_dispatch: # Allow manual trigger from GitHub UI

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch news signals
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node fetch-news-signals.js

      - name: Run dashboard update (BLS + indicators)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node update-dashboard.js

      - name: Check for changes
        id: changes
        run: |
          git diff --quiet chart-data.json indicators.json news-signals.json va-futures-code/public/news-signals.json 2>/dev/null && echo "changed=false" >> $GITHUB_OUTPUT || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add chart-data.json indicators.json news-signals.json va-futures-code/public/news-signals.json va-futures-code/public/chart-data.json va-futures-code/public/indicators.json
          git commit -m "Dashboard update: $(date +%Y-%m-%d)

          Automated update from BLS LAUS data, news signals pipeline,
          and Claude indicator assessment.

          Co-Authored-By: Claude Opus 4.6 (1M context) <noreply@anthropic.com>"
          git push
