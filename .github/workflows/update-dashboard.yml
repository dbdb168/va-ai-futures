name: Quarterly Dashboard Update

on:
  schedule:
    # Runs at 9am ET on the 15th of March, June, September, December
    - cron: '0 13 15 3,6,9,12 *'
  workflow_dispatch: # Allow manual trigger from GitHub UI

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run dashboard update
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node update-dashboard.js

      - name: Check for changes
        id: changes
        run: |
          git diff --quiet chart-data.json indicators.json && echo "changed=false" >> $GITHUB_OUTPUT || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add chart-data.json indicators.json
          git commit -m "Quarterly dashboard update: $(date +%Y-%m-%d)

          Automated update from BLS LAUS data and Claude indicator assessment.
          See update-dashboard.js for methodology and parameters.

          Co-Authored-By: Claude Opus 4.6 (1M context) <noreply@anthropic.com>"
          git push
