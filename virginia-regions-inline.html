<!--
  Virginia Weldon Cooper Center Demographic Regions - Inline SVG
  Drop this directly into any HTML page. No external file needed.

  Usage:
    1. Copy everything between the <svg> tags (inclusive)
    2. Paste into your HTML where you want the map to appear
    3. The SVG is responsive — it will scale to fit its container
    4. Add a max-width on a wrapper div to control size, e.g.:
       <div style="max-width: 800px;">...</div>

  JavaScript access example:
    document.querySelectorAll('[data-region]').forEach(path => {
      path.addEventListener('click', () => {
        console.log('Clicked:', path.dataset.region);
      });
    });
-->
